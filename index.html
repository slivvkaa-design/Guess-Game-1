<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Guess Game 🌸</title>
<style>
body {

    margin: 0;
    height: 100vh;
    font-family: Arial;
    background: #ffd6e8;
    display: flex;
    justify-content: center;
    align-items: center;
}
/* wspólny styl okien */
.box {
    position: relative;
    z-index: 2;
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
.background {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.25;
    z-index: 0;
}
button {
    padding: 10px 15px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #ff4f9a;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #ff2f86;
}

input {
    padding: 10px;
    width: 80%;
    border-radius: 10px;
    border: 1px solid #ffb6d5;
    margin-top: 10px;
}
</style>
</head>

<body>
<img src="flowers.jpg" class="background">
<!-- 🌸 MENU -->
<div id="menu" class="box">
    <h1>🌸 Guess Game</h1>

    <button onclick="startGame()">Start gry</button>
    <button onclick="showInfo()">Instrukcja</button>

    <p id="info"></p>
</div>

<!-- 🎮 GRA -->
<div id="game" class="box" style="display:none;">
    <h1>Zgadnij liczbę 💗</h1>

    <input id="guess" type="number" placeholder="1-100">

    <br>

    <button onclick="check()">Sprawdź</button>
    <button onclick="restart()">Reset</button>
    <button onclick="backToMenu()">Wyjdź</button>

    <p id="result"></p>
    <p id="attempts"></p>
</div>

<script>

let secret;
let attempts = 0;

/* 👉 MENU → GRA */
function startGame() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";

    secret = Math.floor(Math.random() * 100) + 1;
    attempts = 0;
}

/* 👉 INSTRUKCJA */
function showInfo() {
    document.getElementById("info").innerText =
        "Zgadnij liczbę od 1 do 100 💗";
}

/* 👉 SPRAWDZANIE */
function check() {
    let guess = Number(document.getElementById("guess").value);

    if (guess < 1 || guess > 100 || isNaN(guess)) {
        document.getElementById("result").innerText =
            "1–100 tylko 🌸";
        return;
    }

    attempts++;

    if (guess < secret) {
        document.getElementById("result").innerText = "Za mało 🌸";
    } 
    else if (guess > secret) {
        document.getElementById("result").innerText = "Za dużo 🌸";
    } 
    else {
        document.getElementById("result").innerText = "WYGRAŁAŚ 🎉💗";
    }

    document.getElementById("attempts").innerText =
        "Próby: " + attempts;
}

/* 👉 RESET */
function restart() {
    secret = Math.floor(Math.random() * 100) + 1;
    attempts = 0;

    document.getElementById("result").innerText = "";
    document.getElementById("attempts").innerText = "";
    document.getElementById("guess").value = "";
}

/* 👉 WYJŚCIE DO MENU */
function backToMenu() {
    document.getElementById("game").style.display = "none";
    document.getElementById("menu").style.display = "block";

    document.getElementById("result").innerText = "";
    document.getElementById("attempts").innerText = "";
}

</script>

</body>
</html>
